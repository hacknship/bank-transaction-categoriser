<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maybank Budget Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --yellow: #FFD600;
      --black: #000000;
      --white: #FFFFFF;
      --gray: #F0F0F0;
    }

    body {
      width: 320px;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: var(--white);
    }

    .header {
      background: var(--black);
      color: var(--yellow);
      padding: 20px 16px;
      text-align: center;
      border-bottom: 4px solid var(--yellow);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header p {
      font-size: 11px;
      margin-top: 6px;
      color: var(--white);
      font-weight: 500;
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background: var(--white);
      border: 3px solid var(--black);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 4px 4px 0 var(--black);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      text-transform: uppercase;
    }

    .status-value {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border: 2px solid var(--black);
    }

    .status-value.active {
      background: var(--yellow);
      color: var(--black);
    }

    .status-value.inactive {
      background: var(--gray);
      color: var(--black);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: 3px solid var(--black);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 4px 4px 0 var(--black);
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }

    .btn-yellow {
      background: var(--yellow);
      color: var(--black);
    }

    .btn-yellow:hover {
      background: #FFE033;
    }

    .btn-black {
      background: var(--black);
      color: var(--yellow);
    }

    .btn-black:hover {
      background: #333;
    }

    .shortcuts {
      background: var(--gray);
      border: 3px solid var(--black);
      padding: 16px;
      margin-top: 16px;
    }

    .shortcuts h3 {
      font-size: 11px;
      font-weight: 700;
      color: var(--black);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 2px solid var(--black);
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-key {
      background: var(--yellow);
      padding: 2px 8px;
      border: 2px solid var(--black);
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 10px;
      color: #666;
      border-top: 3px solid var(--black);
      background: var(--gray);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💰 Maybank Budget Tracker</h1>
    <p>Categorize transactions with ease</p>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-value" id="status">Checking...</span>
      </div>
      <div class="status-row">
        <span class="status-label">Saved Transactions</span>
        <span class="status-value" id="count">0</span>
      </div>
    </div>

    <button class="btn btn-yellow" id="viewDataBtn">📊 View Local Data</button>

    <div class="shortcuts">
      <h3>Keyboard Shortcuts</h3>
      <div class="shortcut-row">
        <span>Navigate</span>
        <span><span class="shortcut-key">↑↓←→</span></span>
      </div>
      <div class="shortcut-row">
        <span>Save & Next</span>
        <span><span class="shortcut-key">Enter</span></span>
      </div>
      <div class="shortcut-row">
        <span>Close Dropdown</span>
        <span><span class="shortcut-key">Esc</span></span>
      </div>
    </div>
  </div>

  <div class="footer">
    Maybank Budget Tracker v1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
